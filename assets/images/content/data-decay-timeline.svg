<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1a1d1e"/>
  <text x="600" y="50" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">30% Annual Data Decay Timeline</text>
  <text x="600" y="78" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#8a9499" text-anchor="middle">How your CRM records go stale over 12 months</text>

  <!-- Timeline axis -->
  <line x1="100" y1="480" x2="1100" y2="480" stroke="#4d5456" stroke-width="2"/>

  <!-- Decay curve (approximated with polyline) -->
  <polyline points="140,160 310,195 480,265 650,340 820,390 990,430" stroke="#00b894" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Danger zone fill -->
  <polygon points="140,160 310,195 480,265 650,340 820,390 990,430 990,480 140,480" fill="url(#decayGrad)" opacity="0.15"/>
  <defs>
    <linearGradient id="decayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- Month 1 marker -->
  <g transform="translate(140,100)">
    <rect x="-60" y="-40" width="120" height="70" rx="8" fill="#2d3436" stroke="#00b894" stroke-width="2"/>
    <text x="0" y="-14" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#00b894" text-anchor="middle">95%</text>
    <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#b2bec3" text-anchor="middle">Accurate</text>
  </g>
  <circle cx="140" cy="160" r="8" fill="#00b894"/>
  <line x1="140" y1="130" x2="140" y2="155" stroke="#00b894" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="140" y="510" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Month 1</text>

  <!-- Month 3 marker -->
  <g transform="translate(310,140)">
    <rect x="-55" y="-35" width="110" height="60" rx="8" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="0" y="-8" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">89%</text>
    <text x="0" y="12" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499" text-anchor="middle">Accurate</text>
  </g>
  <circle cx="310" cy="195" r="6" fill="#b2bec3"/>
  <line x1="310" y1="165" x2="310" y2="191" stroke="#4d5456" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="310" y="510" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a9499" text-anchor="middle">Month 3</text>

  <!-- Month 6 marker -->
  <g transform="translate(480,210)">
    <rect x="-55" y="-35" width="110" height="60" rx="8" fill="#2d3436" stroke="#e17055" stroke-width="1.5"/>
    <text x="0" y="-8" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#e17055" text-anchor="middle">82%</text>
    <text x="0" y="12" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499" text-anchor="middle">Accurate</text>
  </g>
  <circle cx="480" cy="265" r="6" fill="#e17055"/>
  <line x1="480" y1="235" x2="480" y2="261" stroke="#e17055" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="510" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a9499" text-anchor="middle">Month 6</text>

  <!-- Month 9 marker -->
  <g transform="translate(650,285)">
    <rect x="-55" y="-35" width="110" height="60" rx="8" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="0" y="-8" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#e17055" text-anchor="middle">76%</text>
    <text x="0" y="12" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499" text-anchor="middle">Accurate</text>
  </g>
  <circle cx="650" cy="340" r="6" fill="#e17055"/>
  <line x1="650" y1="315" x2="650" y2="336" stroke="#4d5456" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="650" y="510" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a9499" text-anchor="middle">Month 9</text>

  <!-- Month 12 marker -->
  <g transform="translate(990,370)">
    <rect x="-60" y="-40" width="120" height="70" rx="8" fill="#2d3436" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="-14" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#e74c3c" text-anchor="middle">70%</text>
    <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#b2bec3" text-anchor="middle">Accurate</text>
  </g>
  <circle cx="990" cy="430" r="8" fill="#e74c3c"/>
  <line x1="990" y1="400" x2="990" y2="425" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="990" y="510" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Month 12</text>

  <!-- What decays callouts -->
  <g transform="translate(100,545)">
    <rect width="190" height="50" rx="8" fill="#2d3436"/>
    <circle cx="20" cy="25" r="6" fill="#e74c3c"/>
    <text x="34" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Job title changes</text>
    <text x="34" y="38" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">~15% annual turnover</text>
  </g>
  <g transform="translate(320,545)">
    <rect width="190" height="50" rx="8" fill="#2d3436"/>
    <circle cx="20" cy="25" r="6" fill="#e74c3c"/>
    <text x="34" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Email bounces</text>
    <text x="34" y="38" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">~22% become invalid</text>
  </g>
  <g transform="translate(540,545)">
    <rect width="190" height="50" rx="8" fill="#2d3436"/>
    <circle cx="20" cy="25" r="6" fill="#e74c3c"/>
    <text x="34" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Phone disconnects</text>
    <text x="34" y="38" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">~18% go stale</text>
  </g>
  <g transform="translate(760,545)">
    <rect width="210" height="50" rx="8" fill="#2d3436"/>
    <circle cx="20" cy="25" r="6" fill="#e74c3c"/>
    <text x="34" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Company changes</text>
    <text x="34" y="38" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">M&amp;A, closures, rebrands</text>
  </g>
</svg>