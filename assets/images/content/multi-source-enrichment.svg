<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1a1d1e"/>
  <text x="600" y="50" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">50+ Data Sources, One Enriched Record</text>
  <text x="600" y="78" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#8a9499" text-anchor="middle">How Verum cross-references multiple sources for verified accuracy</text>

  <!-- Left column: Source categories -->
  <!-- Public Records -->
  <g transform="translate(40,110)">
    <rect width="220" height="110" rx="10" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#00b894">Public Records</text>
    <text x="18" y="50" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">SEC filings &amp; court records</text>
    <text x="18" y="68" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">State business registrations</text>
    <text x="18" y="86" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Professional license databases</text>
  </g>

  <!-- Commercial DBs -->
  <g transform="translate(40,240)">
    <rect width="220" height="110" rx="10" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#00b894">Commercial Databases</text>
    <text x="18" y="50" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Firmographic providers</text>
    <text x="18" y="68" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Technographic feeds</text>
    <text x="18" y="86" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Intent data platforms</text>
  </g>

  <!-- Web Scraping -->
  <g transform="translate(40,370)">
    <rect width="220" height="110" rx="10" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#00b894">Web Intelligence</text>
    <text x="18" y="50" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Company website analysis</text>
    <text x="18" y="68" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Press releases &amp; news</text>
    <text x="18" y="86" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Job postings &amp; hiring signals</text>
  </g>

  <!-- Social APIs -->
  <g transform="translate(40,500)">
    <rect width="220" height="100" rx="10" fill="#2d3436" stroke="#4d5456" stroke-width="1"/>
    <text x="18" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#00b894">Social &amp; Professional</text>
    <text x="18" y="50" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">LinkedIn profile matching</text>
    <text x="18" y="68" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Social network signals</text>
  </g>

  <!-- Convergence arrows -->
  <g>
    <line x1="270" y1="165" x2="420" y2="310" stroke="#00b894" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <line x1="270" y1="295" x2="420" y2="310" stroke="#00b894" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <line x1="270" y1="425" x2="420" y2="330" stroke="#00b894" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
    <line x1="270" y1="545" x2="420" y2="345" stroke="#00b894" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  </g>

  <!-- Center: Verum engine -->
  <g transform="translate(420,240)">
    <rect width="280" height="160" rx="14" fill="#2d3436" stroke="#00b894" stroke-width="2.5"/>
    <text x="140" y="34" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#00b894" text-anchor="middle">VERUM ENGINE</text>
    <line x1="30" y1="48" x2="250" y2="48" stroke="#4d5456" stroke-width="1"/>
    <text x="140" y="72" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#b2bec3" text-anchor="middle">Cross-reference &amp; validate</text>
    <text x="140" y="92" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#b2bec3" text-anchor="middle">Confidence scoring</text>
    <text x="140" y="112" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#b2bec3" text-anchor="middle">Human QA review</text>
