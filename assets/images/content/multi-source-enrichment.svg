    <text x="140" y="143" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#00b894" text-anchor="middle">50+ sources matched</text>
  </g>

  <!-- Output arrow -->
  <g transform="translate(710,310)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#00b894" stroke-width="2.5"/>
    <polygon points="56,-7 70,0 56,7" fill="#00b894"/>
  </g>

  <!-- Right: Enriched record output -->
  <g transform="translate(785,120)">
    <rect width="370" height="400" rx="14" fill="#00b894" opacity="0.08" stroke="#00b894" stroke-width="2"/>
    <text x="185" y="34" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Enriched Record</text>
    <line x1="20" y1="48" x2="350" y2="48" stroke="#4d5456" stroke-width="1"/>

    <!-- Record fields -->
    <g transform="translate(20,62)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Name</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#fff">Jane Rodriguez, VP Sales</text>
    </g>
    <g transform="translate(20,102)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
