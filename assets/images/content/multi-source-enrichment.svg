      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#00b894">j.rodriguez@acme.com</text>
      <circle cx="310" cy="16" r="6" fill="#00b894"/>
      <text x="310" y="20" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">&#x2713;</text>
    </g>
    <g transform="translate(20,142)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Direct Dial</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#00b894">(415) 555-0142</text>
      <circle cx="310" cy="16" r="6" fill="#00b894"/>
      <text x="310" y="20" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">&#x2713;</text>
    </g>
    <g transform="translate(20,182)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Company</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#fff">Acme Corp (250 emp, $45M rev)</text>
    </g>
    <g transform="translate(20,222)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Tech Stack</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#fff">Salesforce, Outreach, Gong</text>
    </g>
    <g transform="translate(20,262)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">LinkedIn</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#00b894">Verified profile match</text>
      <circle cx="310" cy="16" r="6" fill="#00b894"/>
      <text x="310" y="20" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">&#x2713;</text>
    </g>
    <g transform="translate(20,302)">
      <rect width="330" height="32" rx="6" fill="#2d3436"/>
      <text x="12" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Intent</text>
      <text x="120" y="21" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#fff">Researching CRM migration</text>
    </g>
    <g transform="translate(20,346)">
      <rect width="160" height="28" rx="6" fill="rgba(0,184,148,0.2)"/>
      <text x="80" y="19" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#00b894" text-anchor="middle">Confidence: 97%</text>
      <rect x="180" y="0" width="150" height="28" rx="6" fill="rgba(0,184,148,0.2)"/>
      <text x="255" y="19" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#00b894" text-anchor="middle">Sources: 8 matched</text>
    </g>
