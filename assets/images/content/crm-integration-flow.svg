    <rect x="100" y="134" width="230" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="134" width="214" height="16" rx="4" fill="#00b894"/>
    <text x="321" y="146" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">93%</text>

    <text x="24" y="174" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Company</text>
    <rect x="100" y="162" width="230" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="162" width="225" height="16" rx="4" fill="#00b894"/>
    <text x="333" y="174" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">98%</text>

    <text x="24" y="202" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Industry</text>
    <rect x="100" y="190" width="230" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="190" width="207" height="16" rx="4" fill="#00b894"/>
    <text x="315" y="202" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">90%</text>

    <text x="24" y="230" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Revenue</text>
    <rect x="100" y="218" width="230" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="218" width="184" height="16" rx="4" fill="#00b894"/>
    <text x="292" y="230" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">80%</text>

    <!-- Average -->
