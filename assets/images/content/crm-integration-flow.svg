    <text x="24" y="146" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Job Title</text>
    <rect x="100" y="134" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="134" width="102" height="16" rx="4" fill="#e17055"/>
    <text x="210" y="146" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">60%</text>

    <text x="24" y="174" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Company</text>
    <rect x="100" y="162" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="162" width="136" height="16" rx="4" fill="#e17055"/>
    <text x="244" y="174" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">80%</text>

    <text x="24" y="202" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Industry</text>
    <rect x="100" y="190" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="190" width="51" height="16" rx="4" fill="#e74c3c"/>
    <text x="159" y="202" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">30%</text>

    <text x="24" y="230" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Revenue</text>
    <rect x="100" y="218" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="218" width="34" height="16" rx="4" fill="#e74c3c"/>
