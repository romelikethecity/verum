    <text x="150" y="32" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Your CRM (Before)</text>
    <text x="150" y="52" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499" text-anchor="middle">Salesforce / HubSpot / Other</text>
    <line x1="20" y1="64" x2="280" y2="64" stroke="#4d5456" stroke-width="1"/>

    <!-- Field completeness bars (before) -->
    <text x="24" y="90" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Email</text>
    <rect x="100" y="78" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="78" width="119" height="16" rx="4" fill="#e17055"/>
    <text x="228" y="90" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">70%</text>

    <text x="24" y="118" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#b2bec3">Phone</text>
    <rect x="100" y="106" width="170" height="16" rx="4" fill="#3d4446"/>
    <rect x="100" y="106" width="68" height="16" rx="4" fill="#e74c3c"/>
