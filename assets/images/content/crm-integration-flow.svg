    <text x="140" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">Salesforce</text>
    <rect x="200" y="0" width="90" height="28" rx="6" fill="#3d4446"/>
    <text x="245" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">HubSpot</text>
    <rect x="300" y="0" width="80" height="28" rx="6" fill="#3d4446"/>
    <text x="340" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">Pipedrive</text>
    <rect x="390" y="0" width="90" height="28" rx="6" fill="#3d4446"/>
    <text x="435" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">Dynamics</text>
    <rect x="490" y="0" width="60" height="28" rx="6" fill="#3d4446"/>
    <text x="520" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">Zoho</text>
    <rect x="560" y="0" width="80" height="28" rx="6" fill="#3d4446"/>
    <text x="600" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#b2bec3" text-anchor="middle">Any CSV</text>
