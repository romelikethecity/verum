    <text x="180" y="256" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#00b894" text-anchor="middle">Avg. completeness: 90%</text>
  </g>

  <!-- Bottom summary bar -->
  <g transform="translate(60,420)">
    <rect width="1080" height="80" rx="10" fill="#2d3436"/>
    <g transform="translate(80,14)">
      <text x="0" y="22" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#e17055">50%</text>
      <text x="0" y="44" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">Before completeness</text>
    </g>
    <g transform="translate(320,14)">
      <text x="0" y="22" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#00b894">90%</text>
      <text x="0" y="44" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">After completeness</text>
    </g>
    <g transform="translate(560,14)">
      <text x="0" y="22" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#fff">24&#8209;48hr</text>
      <text x="0" y="44" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">Turnaround time</text>
    </g>
    <g transform="translate(800,14)">
      <text x="0" y="22" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" fill="#00b894">0</text>
      <text x="0" y="44" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">CRM changes needed</text>
    </g>
  </g>

  <!-- Compatible CRMs -->
