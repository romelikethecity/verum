<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1a1d1e"/>
  <text x="600" y="50" font-family="Inter,system-ui,sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">CRM Integration Flow</text>
  <text x="600" y="78" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#8a9499" text-anchor="middle">Export from your CRM, enrich with Verum, import back with full field coverage</text>

  <!-- Phase 1: CRM Export -->
  <g transform="translate(40,110)">
