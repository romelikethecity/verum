    <rect x="20" y="94" width="220" height="28" rx="6" fill="rgba(0,184,148,0.08)"/>
    <text x="130" y="113" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#00b894" text-anchor="middle">Email verification</text>

