<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Verum case study results: before and after metrics</title>
  <desc id="desc">Comparison of customer metrics before and after Verum engagement across coverage, deliverability, and dial rate.</desc>
  <defs>
    <style>
      .bg { fill: #1a1d1e; }
      .card { fill: #2d3436; stroke: #3a4244; stroke-width: 1; }
      .cardPrimary { fill: #2d3436; stroke: #00b894; stroke-width: 2; }
      .h { fill: #ffffff; font: 700 30px Inter, system-ui, sans-serif; }
      .sub { fill: #b2bec3; font: 400 16px Inter, system-ui, sans-serif; }
      .muted { fill: #7f8c8d; font: 400 12px Inter, system-ui, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .metricLabel { fill: #b2bec3; font: 500 14px Inter, system-ui, sans-serif; }
      .before { fill: #636e72; font: 700 48px Inter, system-ui, sans-serif; }
      .beforeLabel { fill: #7f8c8d; font: 500 11px Inter, system-ui, sans-serif; letter-spacing: 0.1em; text-transform: uppercase; }
      .after { fill: #00b894; font: 700 48px Inter, system-ui, sans-serif; }
      .afterLabel { fill: #00b894; font: 500 11px Inter, system-ui, sans-serif; letter-spacing: 0.1em; text-transform: uppercase; }
      .delta { fill: #00b894; font: 700 14px Inter, system-ui, sans-serif; }
      .arrow { stroke: #00b894; stroke-width: 2; fill: none; }
      .bar { fill: #636e72; }
      .barAfter { fill: #00b894; }
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00b894"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <text class="muted" x="60" y="64">Case Study Results</text>
  <text class="h" x="60" y="108">Before Verum vs. after Verum</text>
  <text class="sub" x="60" y="140">60-day snapshot across a real engagement. Metrics that show up in the pipeline.</text>

  <!-- Metric 1: Coverage -->
  <g transform="translate(60,200)">
    <rect class="cardPrimary" width="350" height="170" rx="12"/>
    <text class="metricLabel" x="20" y="32">Direct dial coverage</text>
    <text class="beforeLabel" x="20" y="58">BEFORE</text>
    <text class="before" x="20" y="108">12%</text>
    <line x1="155" y1="70" x2="155" y2="130" stroke="#3a4244"/>
    <text class="afterLabel" x="180" y="58">AFTER</text>
    <text class="after" x="180" y="108">73%</text>
    <line class="arrow" x1="20" y1="140" x2="330" y2="140" marker-end="url(#ar)"/>
    <text class="delta" x="20" y="160">+61 points</text>
  </g>

  <!-- Metric 2: Deliverability -->
  <g transform="translate(425,200)">
    <rect class="cardPrimary" width="350" height="170" rx="12"/>
    <text class="metricLabel" x="20" y="32">Email deliverability</text>
    <text class="beforeLabel" x="20" y="58">BEFORE</text>
    <text class="before" x="20" y="108">64%</text>
    <line x1="155" y1="70" x2="155" y2="130" stroke="#3a4244"/>
    <text class="afterLabel" x="180" y="58">AFTER</text>
    <text class="after" x="180" y="108">94%</text>
    <line class="arrow" x1="20" y1="140" x2="330" y2="140" marker-end="url(#ar)"/>
    <text class="delta" x="20" y="160">+30 points</text>
  </g>

  <!-- Metric 3: Duplicates -->
  <g transform="translate(790,200)">
    <rect class="cardPrimary" width="350" height="170" rx="12"/>
    <text class="metricLabel" x="20" y="32">Duplicate accounts</text>
    <text class="beforeLabel" x="20" y="58">BEFORE</text>
    <text class="before" x="20" y="108">18%</text>
    <line x1="155" y1="70" x2="155" y2="130" stroke="#3a4244"/>
    <text class="afterLabel" x="180" y="58">AFTER</text>
    <text class="after" x="180" y="108">&lt;1%</text>
    <line class="arrow" x1="20" y1="140" x2="330" y2="140" marker-end="url(#ar)"/>
    <text class="delta" x="20" y="160">17 pt reduction</text>
  </g>

  <!-- Bar chart bottom: pipeline impact -->
  <g transform="translate(60,400)">
    <rect class="card" width="1080" height="190" rx="12"/>
    <text class="muted" x="20" y="36">60-Day Pipeline Impact</text>
    <text class="metricLabel" x="20" y="58">Meetings booked per SDR / week</text>

    <!-- before bar -->
    <text class="beforeLabel" x="20" y="94">BEFORE</text>
    <rect class="bar" x="120" y="80" width="180" height="18" rx="4"/>
    <text class="before" x="310" y="98" font-size="18">2.1</text>

    <!-- after bar -->
    <text class="afterLabel" x="20" y="134">AFTER</text>
    <rect class="barAfter" x="120" y="120" width="540" height="18" rx="4"/>
    <text class="after" x="670" y="138" font-size="18">6.4</text>

    <text class="delta" x="20" y="170">3x meetings booked with the same rep count</text>
  </g>
</svg>
