<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="glow-verum-best-crm-hygiene-2025" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="200" height="220" rx="12" fill="#0F172A"/>
  <rect width="200" height="220" rx="12" fill="none" stroke="#1E293B" stroke-width="1"/>

  <!-- Network nodes icon (logo motif) -->
  <g transform="translate(100, 32)">
    <!-- Connection lines -->
    <line x1="0" y1="-10" x2="-14" y2="8" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-10" x2="14" y2="8" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="0" cy="-10" r="5" fill="#3B82F6"/>
    <circle cx="-14" cy="8" r="4" fill="#60A5FA"/>
    <circle cx="14" cy="8" r="4" fill="#60A5FA"/>
    <!-- Center glow -->
    <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Award text -->
  <text x="100" y="72" text-anchor="middle" fill="#3B82F6" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="0.5">Best CRM</text>
  <text x="100" y="94" text-anchor="middle" fill="#F0F0F0" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700">Data Hygiene</text>

  <!-- Year with electric blue glow effect -->
  <text x="100" y="126" text-anchor="middle" fill="#3B82F6" font-family="'Space Grotesk', system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="3">2025</text>

  <!-- Subtle network lines decoration -->
  <line x1="30" y1="142" x2="80" y2="142" stroke="#1E293B" stroke-width="1"/>
  <circle cx="85" cy="142" r="2" fill="#3B82F6" opacity="0.5"/>
  <line x1="90" y1="142" x2="110" y2="142" stroke="#1E293B" stroke-width="1"/>
  <circle cx="115" cy="142" r="2" fill="#3B82F6" opacity="0.5"/>
  <line x1="120" y1="142" x2="170" y2="142" stroke="#1E293B" stroke-width="1"/>

  <!-- Winner badge -->
  <rect x="55" y="156" width="90" height="26" rx="6" fill="none" stroke="url(#glow-verum-best-crm-hygiene-2025)" stroke-width="1.5"/>
  <text x="100" y="174" text-anchor="middle" fill="#60A5FA" font-family="'Space Grotesk', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="2">WINNER</text>

  <!-- Publication -->
  <text x="100" y="204" text-anchor="middle" fill="#475569" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="1.5">THE REVOPS REPORT</text>
</svg>