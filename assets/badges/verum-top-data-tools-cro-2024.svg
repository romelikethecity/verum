<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="navy-verum-top-data-tools-cro-2024" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- White background with navy top band -->
  <rect width="200" height="220" rx="0" fill="#FFFFFF"/>
  <rect width="200" height="60" fill="url(#navy-verum-top-data-tools-cro-2024)"/>

  <!-- Circle + chevron icon (logo motif) centered in navy band -->
  <circle cx="100" cy="30" r="18" fill="#1D4ED8"/>
  <polyline points="92,34 100,24 108,34" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gold accent line at band edge -->
  <rect x="0" y="58" width="200" height="2" fill="#D4A853"/>

  <!-- Award text -->
  <text x="100" y="90" text-anchor="middle" fill="#0a1628" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700">Top Data Tools</text>
  <text x="100" y="110" text-anchor="middle" fill="#0a1628" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700">for CROs</text>

  <!-- Year with gold underline -->
  <text x="100" y="142" text-anchor="middle" fill="#0a1628" font-family="'Space Grotesk', system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="2">2024</text>
  <rect x="75" y="148" width="50" height="2" rx="1" fill="#D4A853"/>

  <!-- Winner badge -->
  <rect x="55" y="162" width="90" height="26" rx="4" fill="#0a1628"/>
  <text x="100" y="180" text-anchor="middle" fill="#D4A853" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="2">WINNER</text>

  <!-- Publication -->
  <text x="100" y="208" text-anchor="middle" fill="#64748B" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="1.5">THE CRO REPORT</text>
</svg>