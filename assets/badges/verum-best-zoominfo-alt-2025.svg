<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="bar1-verum-best-zoominfo-alt-2025" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="bar2-verum-best-zoominfo-alt-2025" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="220" rx="12" fill="#FFFFFF"/>
  <rect width="200" height="220" rx="12" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="200" height="4" rx="2" fill="url(#bar1-verum-best-zoominfo-alt-2025)"/>

  <!-- Ranking bars icon (the logo motif) -->
  <rect x="55" y="20" width="90" height="8" rx="4" fill="#22D3EE"/>
  <rect x="65" y="32" width="70" height="8" rx="4" fill="#6366F1"/>
  <rect x="75" y="44" width="50" height="8" rx="4" fill="#818CF8" opacity="0.6"/>

  <!-- Award text -->
  <text x="100" y="78" text-anchor="middle" fill="#0F172A" font-family="'Space Grotesk', system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="0.3">Best ZoomInfo</text>
  <text x="100" y="98" text-anchor="middle" fill="#0F172A" font-family="'Space Grotesk', system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="0.3">Alternative</text>

  <!-- Year in monospace -->
  <rect x="60" y="110" width="80" height="32" rx="6" fill="#F1F5F9"/>
  <text x="100" y="132" text-anchor="middle" fill="#6366F1" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="800" letter-spacing="3">2025</text>

  <!-- Divider -->
  <line x1="40" y1="152" x2="160" y2="152" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Score badge -->
  <rect x="60" y="160" width="80" height="24" rx="12" fill="url(#bar2-verum-best-zoominfo-alt-2025)"/>
  <text x="100" y="177" text-anchor="middle" fill="#FFFFFF" font-family="'Space Grotesk', system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">WINNER</text>

  <!-- Publication -->
  <text x="100" y="205" text-anchor="middle" fill="#94A3B8" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="1.2">B2B SALES TOOLS</text>
</svg>